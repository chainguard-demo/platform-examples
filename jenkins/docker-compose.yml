name: chainguard-jenkins-demo

# Architecture: DooD (Docker-out-of-Docker) — Jenkins talks to the host's
# Docker daemon via the mounted socket. This is more reliable than DinD on
# macOS Docker Desktop / OrbStack, where dockerd's 15-second containerd-init
# timeout fails under nested virtualization.
#
# JENKINS_HOME is bind-mounted from /tmp/cgjenkins-home at the SAME PATH on
# both host and container. That way, when Jenkins asks the host daemon to
# `docker run -v <workspace>:<workspace>` for a build container, the path
# exists on the host and the build container sees the workspace files.

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
      args:
        CHAINGUARD_ORG: ${CHAINGUARD_ORG:-smalls.xyz}
    environment:
      # Surface the configured org to pipelines (Jenkinsfiles read env.CHAINGUARD_ORG)
      # and to JCasC (jenkins.yaml interpolates ${CHAINGUARD_ORG}).
      CHAINGUARD_ORG: ${CHAINGUARD_ORG:-smalls.xyz}
      # Registry routing — set by setup.sh based on the user's mode choice:
      #   PULL_REGISTRY  cgr.dev/<org>  (Mode A)  or  localhost/cgr-proxy/<org> (Modes B/C)
      #   PUSH_REGISTRY  ttl.sh/<prefix> (Modes A/B)  or  localhost/library    (Mode C)
      #   HARBOR_ENABLED true|false      (drives whether the cgLogin OIDC dance runs)
      PULL_REGISTRY: ${PULL_REGISTRY:-cgr.dev/${CHAINGUARD_ORG:-smalls.xyz}}
      PUSH_REGISTRY: ${PUSH_REGISTRY:-ttl.sh/smalls}
      HARBOR_ENABLED: ${HARBOR_ENABLED:-false}
      JENKINS_HOME: /tmp/cgjenkins-home
      CASC_JENKINS_CONFIG: /tmp/cgjenkins-home/casc
      JENKINS_ADMIN_PASSWORD: admin
      # The docker CLI's config dir. Each pipeline's Auth stage runs
      # `chainctl auth configure-docker` which writes a fresh, short-lived
      # token here; subsequent agent docker steps reuse it.
      DOCKER_CONFIG: /tmp/cgjenkins-home/.docker
    # The host docker socket is owned root:root inside the container; add the
    # jenkins user (uid 1000) to GID 0 so it can read the socket.
    group_add:
      - "0"
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/cgjenkins-home:/tmp/cgjenkins-home
      - ./jenkins/casc:/tmp/cgjenkins-home/casc:ro
      - ./apps:/sources/apps:ro
      - ./ops:/sources/ops:ro
      # shared-libraries is read-write so the refresh-cgimages-digests job
      # can rewrite vars/cgImage.groovy in place when image tags repoint.
      - ./shared-libraries:/tmp/cgjenkins-home/shared-libraries:rw
      # NOTE: previous setups bind-mounted ./.secrets/docker-config.json here
      # to seed a long-lived pull-token. With the OIDC assumed-identity flow
      # each pipeline's Auth stage writes a fresh chainctl-issued config to
      # DOCKER_CONFIG at build time, so no static config is needed.
