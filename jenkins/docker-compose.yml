name: chainguard-jenkins-demo

# Architecture: DooD (Docker-out-of-Docker) — Jenkins talks to the host's
# Docker daemon via the mounted socket. This is more reliable than DinD on
# macOS Docker Desktop / OrbStack, where dockerd's 15-second containerd-init
# timeout fails under nested virtualization.
#
# JENKINS_HOME is bind-mounted from /tmp/cgjenkins-home at the SAME PATH on
# both host and container. That way, when Jenkins asks the host daemon to
# `docker run -v <workspace>:<workspace>` for a build container, the path
# exists on the host and the build container sees the workspace files.

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    environment:
      JENKINS_HOME: /tmp/cgjenkins-home
      CASC_JENKINS_CONFIG: /tmp/cgjenkins-home/casc
      JENKINS_ADMIN_PASSWORD: admin
      # Point the docker CLI at the pull-token config generated by setup.sh.
      DOCKER_CONFIG: /tmp/cgjenkins-home/.docker
    # The host docker socket is owned root:root inside the container; add the
    # jenkins user (uid 1000) to GID 0 so it can read the socket.
    group_add:
      - "0"
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/cgjenkins-home:/tmp/cgjenkins-home
      - ./jenkins/casc:/tmp/cgjenkins-home/casc:ro
      - ./apps:/sources/apps:ro
      - ./.secrets/docker-config.json:/tmp/cgjenkins-home/.docker/config.json:ro
